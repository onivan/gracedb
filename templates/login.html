<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Система ЦН</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    // Передаємо базовий шлях з Flask у JavaScript
		const SCRIPT_ROOT = {{ request.script_root|tojson|safe }};
		console.log(SCRIPT_ROOT);
	</script>
	
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .card-header {
            background: transparent;
            border-bottom: none;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="card-header text-center">
        <h3 class="fw-bold">Авторизація</h3>
        <p class="text-muted small">Увійдіть у ваш ЦН-аккаунт</p>
    </div>
    <div class="card-body px-4 pb-4">
        <div id="errorMessage" class="alert alert-danger d-none mb-3" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Логін</label>
                <input type="text" class="form-control" id="username" required autocomplete="username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" required autocomplete="current-password">
            </div>
            <div class="d-grid">
                <button type="submit" id="loginBtn" class="btn btn-primary py-2">
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    <span id="btnText">Увійти</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');

        errorDiv.classList.add('d-none');
        loginBtn.disabled = true;
        btnSpinner.classList.remove('d-none');
        btnText.textContent = ' Перевірка...';

        try {
            const response = await fetch("{{ url_for('login') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (response.ok && result.success) {
                window.location.href = "{{ url_for('index') }}";
            } else {
                errorDiv.textContent = result.message || 'Помилка доступу';
                errorDiv.classList.remove('d-none');
            }
        } catch (err) {
            errorDiv.textContent = 'Сервер недоступний. Перевірте з\'єднання.';
            errorDiv.classList.remove('d-none');
        } finally {
            loginBtn.disabled = false;
            btnSpinner.classList.add('d-none');
            btnText.textContent = 'Увійти';
        }
    });
</script>

</body>
</html>
